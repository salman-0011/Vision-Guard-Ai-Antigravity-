; ============================================================
; VisionGuard AI - Backend Supervisor Configuration
; ============================================================
; FastAPI backend running under supervisord.
; ============================================================

[supervisord]
nodaemon=true
logfile=/var/log/visionguard/supervisord.log
pidfile=/tmp/supervisord.pid
childlogdir=/var/log/visionguard
user=vguser

[program:backend]
command=python -m uvicorn backend.main:app --host 0.0.0.0 --port %(ENV_VG_PORT)s
directory=/app
autostart=true
autorestart=true
startretries=3
startsecs=5
stopwaitsecs=10
stopsignal=TERM
stdout_logfile=/var/log/visionguard/backend.stdout.log
stderr_logfile=/var/log/visionguard/backend.stderr.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
environment=PYTHONPATH="/app",VG_HOST="0.0.0.0"

[eventlistener:shutdown]
command=bash -c "kill -TERM $(cat /tmp/supervisord.pid)"
events=PROCESS_STATE_FATAL
