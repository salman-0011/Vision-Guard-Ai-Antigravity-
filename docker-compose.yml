  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

  # ============================================================
  # Debug UI - Streamlit (TEMPORARY/DEBUG ONLY)
  # ============================================================
  debug-ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    container_name: vg-debug-ui
    restart: unless-stopped
    networks:
      - visionguard
    ports:
      - "${DEBUG_UI_PORT:-8501}:8501"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - VG_STREAM_NAME=vg:ai:results
      - VG_REFRESH_SEC=1.5
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - debug
